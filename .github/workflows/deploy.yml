name: Deploy Application

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run tests
      run: |
        echo "Running tests..."
        python -m pytest


  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy
      run: |
        echo "Deploying application to production..."
        echo "Deployment successful!"
